<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diff Poster — paste a diff, get a shareable image</title>
    <meta
      name="description"
      content="Paste a before/after code snippet and get a single beautiful, shareable diff image. No login, no export dialog."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%238a1c1c'/%3E%3Ctext x='32' y='45' font-family='Georgia,serif' font-size='34' font-weight='700' fill='%23fbf8f1' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero-head">
        <h1 class="wordmark">Diff<span class="wordmark-accent">Poster</span></h1>
        <p class="tagline">
          Paste a before/after snippet, get a shareable diff image. No login,
          no export dialog.
        </p>
      </header>

      <main class="layout">
        <section class="inputs" aria-label="Code input">
          <div class="pane" data-pane="before">
            <label class="pane-label" for="before-input">Before</label>
            <div class="editor">
              <div class="gutter" data-gutter="before" aria-hidden="true">1</div>
              <textarea
                id="before-input"
                class="pane-input"
                spellcheck="false"
                placeholder="Paste the original code…"
              ></textarea>
            </div>
          </div>

          <div class="pane" data-pane="after">
            <label class="pane-label" for="after-input">After</label>
            <div class="editor">
              <div class="gutter" data-gutter="after" aria-hidden="true">1</div>
              <textarea
                id="after-input"
                class="pane-input"
                spellcheck="false"
                placeholder="Paste the changed code…"
              ></textarea>
            </div>
          </div>

          <div class="controls-row">
            <div class="language-field">
              <label class="language-label" for="language-select">Language</label>
              <select id="language-select" class="language-select">
                <option value="javascript" selected>JavaScript</option>
                <option value="python">Python</option>
                <option value="plaintext">Plain text</option>
              </select>
            </div>
            <button id="generate-btn" class="generate-btn" type="button">
              Generate image
            </button>
          </div>
          <p class="privacy-note">
            Everything runs in your browser — nothing is uploaded or stored.
          </p>
        </section>

        <section class="output" aria-label="Generated diff image">
          <div class="output-card" id="output-card" data-state="empty">
            <p class="output-empty" id="output-empty">
              Paste code on the left and hit Generate.
            </p>
            <p class="output-error" id="output-error" role="alert" hidden></p>
            <canvas
              id="output-canvas"
              class="output-canvas"
              hidden
            ></canvas>
          </div>

          <div class="output-actions" id="output-actions" hidden>
            <button id="copy-btn" class="action-btn" type="button">
              Copy image
            </button>
            <button id="download-btn" class="action-btn" type="button">
              Download PNG
            </button>
          </div>
          <p class="output-status" id="output-status" role="status" aria-live="polite"></p>
        </section>
      </main>

      <footer class="site-footer">
        <a class="footer-cta" href="https://github.com/ctkrug/diff-poster">
          View on GitHub
        </a>
        <a class="footer-portfolio" href="https://apps.charliekrug.com">
          More by Charlie Krug → apps.charliekrug.com
        </a>
      </footer>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
